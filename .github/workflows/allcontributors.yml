on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron:  '0 12 * * 0' # weekly on Sunday at 12:00

name: Update allcontributors

jobs:

  allcontributors:

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    name: Update allcontributors

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 5
          extra-packages: any::allcontributors

      - name: Update allcontributors
        run: Rscript -e 'allcontributors::add_contributors()'

      - name: Commit results
        run: |
          git config user.name  "Github Actions"
          git config user.email "github-actions@github.com"
          git commit README.md -m 'Update allcontributors on README.md' || echo "No changes to commit"
          git push https://${{github.actor}}:${{secrets.GITHUB_TOKEN}}@github.com/${{github.repository}}.git HEAD:${{ github.ref }} || echo "No changes to commit"
