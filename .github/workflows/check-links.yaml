name: Check links

on:
  push:
    branches: main
  pull_request:
    branches: main
  schedule:
    # Every Monday at 8am
    - cron: "0 8 * * 1"
  

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@6da1d14f3a43098a294b7696d93d938aa8d20fc0 # v2
        with:
          # Those three cases need to be handled:
          # - exclude the redirection from DOI to BES journal, which always fails in lychee but works 
          #   fine "by hand"
          # - the FSF link always generates a "Network error: received fatal alert: HandshakeFailure" 
          #   but there isn't any related error in lychee's repo
          # - the gnu.org link may generate a 429 (too many requests)
          #
          # This is not ideal but at least we can catch failures in other links.
          args: |
            . --exclude '(^https://doi\.org/10\.1111/2041-210X\.14099$)|(fsf\.org)' --accept 200,429
          fail: true